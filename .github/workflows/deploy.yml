name: Deploy
on:
  push:
    branches:
      - "main"
jobs:
  build:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2
      - name: Copy files
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_SERVER_WEVY }}
          username: ${{ secrets.SSH_USER_WEVY }}
          port: ${{ secrets.SSH_PORT_WEVY }}
          password: ${{ secrets.SSH_PASSWORD_WEVY }}
          source: "./*"
          target: "/home/semaloadm/apps/ticketgo/frontend"
      - name: Install Dependencies
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_SERVER_WEVY }}
          username: ${{ secrets.SSH_USER_WEVY }}
          port: ${{ secrets.SSH_PORT_WEVY }}
          password: ${{ secrets.SSH_PASSWORD_WEVY }}
          script: |
            # run docker commands
            docker exec ticketgo-frontend yarn
            docker exec ticketgo-frontend yarn build
            docker restart ticketgo-frontend